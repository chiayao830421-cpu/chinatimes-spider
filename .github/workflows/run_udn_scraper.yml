name: Run UDN Politics Scraper

on:
  # 🚨 關鍵：改由外部 API (n8n) 觸發
  repository_dispatch:
    types: [trigger-my-scraper]

permissions:
  contents: write

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run udn_scraper.py
        run: |
          python .github/workflows/udn_scraper.py
        env:
          TZ: Asia/Taipei 

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add udn_today_news.json
          git commit -m "🎉 Update UDN Today News (Triggered by n8n)" || echo "No new news to commit."
          git push
