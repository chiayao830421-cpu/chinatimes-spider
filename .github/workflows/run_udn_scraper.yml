name: Run UDN Politics Scraper

on:
  schedule:
    # 🚨 自動執行：每天台北時間早上 8 點 (UTC 0點) 執行一次
    - cron: '0 0 * * *'
  workflow_dispatch: # 🚨 允許你隨時手動按下按鈕執行，不廢話直接跑

# 🚨 賦予 GitHub Actions 寫入權限，否則存下來的 JSON 無法 Push
permissions:
  contents: write

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 環境

    steps:
      # 1. 檢出程式碼 (Checkout code)
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 2. 設定 Python 環境 (Set up Python)
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 指定使用 Python 3.10 版本

      # 3. 安裝必要套件 (Install dependencies)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests # 🚨 這是你 udn_scraper.py 唯一需要的套件

      # 4. 【核心關鍵】執行你的 Python 爬蟲腳本
      - name: Run udn_scraper.py
        run: |
          # 🚨 直接去跑你放在 .github/workflows/ 裡面的那個檔案
          python .github/workflows/udn_scraper.py
        env:
          # 如果你的 Python 程式碼有設定讀取系統日期，確保它是台北時間
          TZ: Asia/Taipei 

      # 5. 【核心關鍵】把存下來的 JSON 結果 Commit 並 Push 回去
      - name: Commit and Push changes
        run: |
          # A. 設定 GitHub Actions 的機器人身分
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"

          # B. 檢查 udn_today_news.json 是否真的存在且有被更新
          # 🚨 注意：你的 Python 程式碼必須在程式執行結束前，把檔案存到 /home/runner/work/你的倉庫名/你的倉庫名/ 下，預設位置就是這裡。
          git add udn_today_news.json

          # C. 嘗試 Commit，如果沒有新新聞導致檔案沒變動，則不噴錯安全跳過
          git commit -m "🎉 Update UDN Today News (Auto-scraped by GitHub Action)" || echo "No new news to commit."

          # D. 推送回倉庫的 main 分支
          git push
