name: Run UDN Politics Scraper

on:
  schedule:
    - cron: '*/15 * * * *' # 每 10 分鐘自動執行一次
  workflow_dispatch:      # 允許手動執行
  
permissions:
  contents: write

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run udn_scraper.py
        run: |
          python .github/workflows/udn_scraper.py
        env:
          TZ: Asia/Taipei 

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add udn_today_news.json
          git commit -m "🎉 Update UDN Today News (Triggered by n8n)" || echo "No new news to commit."
          git push
