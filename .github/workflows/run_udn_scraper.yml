name: Run UDN Politics Scraper

on:
  schedule:
    # 1. 台灣 00:00 - 01:00，每 30 分鐘執行一次 (對應 UTC 16:00, 16:30)
    - cron: '0,30 16 * * *'
    
    # 2. 台灣 05:00 - 09:30，每 30 分鐘執行一次
    # 拆解：台灣 05:00-07:30 (UTC 21:00-23:30) + 台灣 08:00-09:30 (UTC 00:00-01:30)
    - cron: '0,30 21-23 * * *'
    - cron: '0,30 0-1 * * *'

  workflow_dispatch: # 保持手動觸發按鈕

permissions:
  contents: write # 🚨 強制宣告這個工作流有寫入權限，這一步極度重要！

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run UDN Scraper
        run: python .github/workflows/udn_scraper.py

      - name: Commit and Push txt file # 🚨 將產出的 txt 檔自動推回你的 GitHub 倉庫
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add udn_news.txt || echo "No changes to add"
          git commit -m "Update UDN news txt" || echo "No changes to commit"
          git push
