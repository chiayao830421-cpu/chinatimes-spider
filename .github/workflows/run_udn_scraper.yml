name: Run UDN Politics Scraper

on:
  schedule:
    - cron: '0 * * * *' # 
  workflow_dispatch:      # 允許手動執行

permissions:
  contents: write # 🚨 強制宣告這個工作流有寫入權限，這一步極度重要！

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run UDN Scraper
        run: python .github/workflows/udn_scraper.py

      - name: Commit and Push txt file # 🚨 將產出的 txt 檔自動推回你的 GitHub 倉庫
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add udn_news.txt || echo "No changes to add"
          git commit -m "Update UDN news txt" || echo "No changes to commit"
          git push
