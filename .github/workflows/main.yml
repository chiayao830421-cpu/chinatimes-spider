name: ChinaTimes Crawler

on:
  schedule:
    - cron: '*/15 * * * *' # 每 10 分鐘自動執行一次
  workflow_dispatch:      # 允許手動執行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4 lxml playwright
        playwright install chromium # 🚀 在雲端安裝真的 Chrome 瀏覽器

    - name: Run Crawler
      run: python crawler.py
        
    - name: Commit and Push
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add chinatimes.xml
        # 🛡️ 強迫建立 commit，不管檔案內容有沒有變，並強制推送到 main 分支
        git commit -m "Update news with summary: $(date)" || exit 0
        git push origin HEAD:main --force
